// ====== STATE ======
var curTime='7day',curCat='all',isGrid=!1,curDetail=null;

// ====== FILTER ======
function getFiltered(){
  var pool=newsData.slice();
  var now=new Date('2026-06-20');
  if(curTime==='today')pool=pool.filter(function(x){return x.time==='2026-06-20'});
  else if(curTime==='3day')pool=pool.filter(function(x){return new Date(x.time)>=new Date('2026-06-18')});
  else if(curTime==='7day')pool=pool.filter(function(x){return new Date(x.time)>=new Date('2026-06-14')});
  // 30day: all
  if(curCat!=='all')pool=pool.filter(function(x){return x.cat===curCat});
  return pool;
}

function filterTime(t,el){
  curTime=t;
  document.querySelectorAll('#timeTabs button').forEach(function(b){b.classList.remove('tab-active');b.classList.add('bg-white','border-gray-200','text-gray-500')});
  el.classList.add('tab-active');el.classList.remove('bg-white','border-gray-200','text-gray-500');
  renderList();
}

function filterCat(c,el){
  curCat=c;
  document.querySelectorAll('#catTabs1 button,#catTabs2 button').forEach(function(b){b.classList.remove('tab-active');b.classList.add('bg-white','border-gray-200','text-gray-500')});
  el.classList.add('tab-active');el.classList.remove('bg-white','border-gray-200','text-gray-500');
  renderList();
}

// ====== RENDER LIST ======
function renderList(){
  var pool=getFiltered();
  document.getElementById('listCount').textContent='共 '+pool.length+' 条时政';
  var html='';
  pool.forEach(function(item){
    html+='<div class="card-hover flex items-center justify-between px-5 py-4 border-b border-gray-50 last:border-0 cursor-pointer transition" onclick="openDetail('+item.id+')"><div class="flex items-center gap-3 flex-1 min-w-0"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1677ff" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><span class="text-sm font-medium truncate">'+item.title+'</span></div><span class="text-xs bg-gray-100 text-gray-500 px-2.5 py-1 rounded-full whitespace-nowrap ml-3">'+item.cat+'</span></div>';
  });
  document.getElementById('newsList').innerHTML=html||'<div class="text-center py-16 text-gray-400">暂无匹配时政</div>';
}

// ====== VIEW TOGGLE ======
document.getElementById('viewList').addEventListener('click',function(){isGrid=!1;this.classList.add('bg-primary','text-white');this.classList.remove('bg-white','border','text-gray-400');document.getElementById('viewGrid').classList.remove('bg-primary','text-white');document.getElementById('viewGrid').classList.add('bg-white','border','text-gray-400');renderList()});
document.getElementById('viewGrid').addEventListener('click',function(){isGrid=!0;this.classList.add('bg-primary','text-white');this.classList.remove('bg-white','border','text-gray-400');document.getElementById('viewList').classList.remove('bg-primary','text-white');document.getElementById('viewList').classList.add('bg-white','border','text-gray-400');renderList()});

// ====== DETAIL ======
function openDetail(id){
  curDetail=newsData.find(function(x){return x.id===id});if(!curDetail)return;
  document.getElementById('listPage').classList.add('hidden');
  document.getElementById('detailPage').classList.remove('hidden');
  document.getElementById('detailTitle').textContent=curDetail.title;
  document.getElementById('detailSource').textContent=curDetail.source+' · '+curDetail.time;
  document.getElementById('detailStar').textContent=curDetail.star?'★':'☆';
  document.getElementById('detailCat').textContent=curDetail.cat;
  document.getElementById('detailSummary').textContent=curDetail.summary;
  document.getElementById('detailSourceLink').textContent=curDetail.sourceLink;
  // Exam table
  var rows='';
  curDetail.exam.forEach(function(e){rows+='<tr class="border-b border-gray-50"><td class="px-4 py-3 font-semibold text-gray-800">'+e.point+'</td><td class="px-4 py-3 text-gray-600">'+e.test+'</td><td class="px-4 py-3 text-orange-600 text-xs">'+e.trap+'</td><td class="px-4 py-3 text-primary font-semibold text-xs">'+e.mem+'</td></tr>'});
  document.getElementById('tabExamBody').innerHTML=rows;
  // Shenlun
  document.getElementById('tabShenlunContent').textContent=curDetail.shenlun;
  // Words
  var chips='';
  curDetail.words.forEach(function(w){chips+='<span class="px-3 py-1.5 bg-pLight text-primary rounded-full text-sm font-medium">'+w.w+'：'+w.d+'</span>'});
  document.getElementById('tabWordsContent').innerHTML=chips;
  // Reset tabs
  switchDetailTab('exam',document.querySelector('#detailTabs button[data-dtab="exam"]'));
  window.scrollTo(0,0);
}

function backToList(){
  document.getElementById('listPage').classList.remove('hidden');
  document.getElementById('detailPage').classList.add('hidden');
  window.scrollTo(0,0);
}

function toggleStar(){
  if(curDetail){curDetail.star=!curDetail.star;document.getElementById('detailStar').textContent=curDetail.star?'★':'☆'}
}

function switchDetailTab(tab,el){
  document.querySelectorAll('#detailTabs button').forEach(function(b){b.classList.remove('tab-active');b.classList.add('bg-white','border','text-gray-500')});
  el.classList.add('tab-active');el.classList.remove('bg-white','border','text-gray-500');
  document.getElementById('tabExam').classList.add('hidden');document.getElementById('tabShenlun').classList.add('hidden');document.getElementById('tabWords').classList.add('hidden');
  if(tab==='exam')document.getElementById('tabExam').classList.remove('hidden');
  else if(tab==='shenlun')document.getElementById('tabShenlun').classList.remove('hidden');
  else document.getElementById('tabWords').classList.remove('hidden');
}

// ====== INIT ======
renderList();
